<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .total {
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h1>Admin Panel</h1>

<div class="total">
    Total Users: {{ total }}
</div>

<table>
    <tr>
        <th>Age</th>
        <th>Weight</th>
        <th>Height</th>
        <th>Goal</th>
        <th>Diet</th>
        <th>Calories</th>
        <th>Protein</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.get("age") }}</td>
        <td>{{ user.get("weight") }}</td>
        <td>{{ user.get("height") }}</td>
        <td>{{ user.get("goal") }}</td>
        <td>{{ user.get("diet") }}</td>
        <td>{{ user.get("calories") }}</td>
        <td>{{ user.get("protein") }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
