<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .total {
            margin-bottom: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="total">
    Total Users: {{ total }}
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Time</th>
        <th>Age</th>
        <th>Weight</th>
        <th>Height</th>
        <th>Goal</th>
        <th>Diet</th>
        <th>Calories</th>
        <th>Protein</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.timestamp }}</td>
        <td>{{ user.age }}</td>
        <td>{{ user.weight }}</td>
        <td>{{ user.height }}</td>
        <td>{{ user.goal }}</td>
        <td>{{ user.diet }}</td>
        <td>{{ user.calories }}</td>
        <td>{{ user.protein }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
