<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriSmart – AI Diet Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#0f2318;--g2:#1a3a28;--g3:#2d6a4f;--gs:#52b788;--gp:#d8f3dc;
  --cream:#faf6f0;--cream2:#f0e8dc;--cream3:#e0d8d0;
  --txt:#1a1a1a;--txt2:#4a4a4a;--txt3:#888;
  --white:#fff;--r:14px;--r2:20px;
  --sh:0 2px 16px rgba(0,0,0,.08);--sh2:0 8px 40px rgba(0,0,0,.14);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);min-height:100vh}

.hero{background:linear-gradient(145deg,var(--g1),#0a1f14);padding:52px 24px 68px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:rgba(82,183,136,.10)}
.hero::after{content:'';position:absolute;bottom:-60px;left:-60px;width:220px;height:220px;border-radius:50%;background:rgba(231,111,81,.07)}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(82,183,136,.15);border:1px solid rgba(82,183,136,.3);color:var(--gs);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 18px;border-radius:100px;margin-bottom:24px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.6rem);color:var(--white);line-height:1.15;margin-bottom:14px}
.hero h1 em{color:var(--gs);font-style:normal}
.hero p{color:rgba(255,255,255,.52);font-size:1rem;max-width:440px;margin:0 auto;line-height:1.75;font-weight:300}

.wrapper{max-width:820px;margin:0 auto;padding:0 20px 60px}

.form-card{background:var(--white);border-radius:var(--r2);box-shadow:var(--sh2);padding:36px 40px;margin-top:-40px;position:relative;z-index:10}
.form-card h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--g2);margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--gp)}

.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:500;color:var(--txt2);letter-spacing:.05em;text-transform:uppercase}
.field input{border:1.5px solid var(--cream3);border-radius:10px;padding:11px 14px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--txt);background:var(--cream);outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--gs);box-shadow:0 0 0 3px rgba(82,183,136,.15)}

.section-label{font-size:11px;font-weight:500;color:var(--txt2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.pill-group{display:flex;gap:10px;flex-wrap:wrap}
.pill{cursor:pointer;padding:9px 20px;border-radius:100px;border:1.5px solid var(--cream3);font-size:13px;font-weight:500;color:var(--txt2);background:var(--cream);transition:all .2s;user-select:none}
.pill:hover{border-color:var(--gs);color:var(--g3)}
.pill.active{background:var(--g2);border-color:var(--g2);color:var(--white)}

.toggle-group{display:flex;border:1.5px solid var(--cream3);border-radius:10px;overflow:hidden}
.toggle-opt{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--txt2);background:var(--cream);transition:all .2s;user-select:none}
.toggle-opt:first-child{border-right:1px solid var(--cream3)}
.toggle-opt.active{background:var(--g2);color:var(--white)}

.divider{height:1px;background:var(--gp);margin:24px 0}

.btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--g3),var(--g2));color:var(--white);font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 20px rgba(45,106,79,.35)}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(45,106,79,.45)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.loader{display:none;text-align:center;padding:36px 20px}
.spinner{width:40px;height:40px;border:3px solid var(--gp);border-top-color:var(--g3);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{color:var(--txt3);font-size:14px}

.results{display:none;margin-top:24px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.stat-box{background:var(--white);border-radius:var(--r);border:1px solid var(--gp);padding:16px 18px;text-align:center}
.stat-box .val{font-size:1.6rem;font-weight:600;color:var(--g2);line-height:1}
.stat-box .lbl{font-size:11px;color:var(--txt3);letter-spacing:.04em;text-transform:uppercase;margin-top:6px}
.stat-box .note{font-size:11px;color:var(--gs);margin-top:3px}

.meal-block{margin-bottom:28px}
.meal-title{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.meal-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ic-b{background:#fff8e8}.ic-l{background:var(--gp)}.ic-d{background:#eef0fb}
.meal-title h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--g2)}
.meal-title span{font-size:12px;color:var(--txt3);margin-left:auto}

.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.food-card{background:var(--cream);border-radius:var(--r);border:1px solid var(--cream3);padding:16px;transition:box-shadow .2s,transform .15s}
.food-card:hover{box-shadow:var(--sh);transform:translateY(-2px)}
.food-name{font-weight:500;font-size:14px;color:var(--txt);margin-bottom:12px;line-height:1.4}
.macro-list{display:flex;flex-direction:column;gap:5px}
.macro-row{display:flex;justify-content:space-between;font-size:12px}
.macro-row .k{color:var(--txt3)}
.macro-row .v{font-weight:500;color:var(--txt)}
.ml-tag{margin-top:10px;font-size:11px;background:rgba(82,183,136,.14);color:var(--g2);padding:4px 9px;border-radius:6px;border:1px solid rgba(82,183,136,.25);line-height:1.5}

.error-box{background:#fff5f5;border:1px solid #fcc;border-radius:var(--r);padding:14px 18px;color:#c0392b;font-size:14px;margin-top:14px;display:none}

@media(max-width:600px){
  .form-card{padding:24px 16px}
  .grid-3,.stats-row{grid-template-columns:1fr 1fr}
  .food-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hero">
  <h1>Nutri<em>Smart</em></h1>
  <p>Get a personalised full-day Indian meal plan.</p>
</div>

<div class="wrapper">
  <div class="form-card">
    <h2>Tell us about yourself</h2>

    <div style="margin-bottom:20px">
      <div class="section-label">Your Goal</div>
      <div class="pill-group" id="goalGroup">
        <div class="pill active" data-val="loss">⬇ Weight Loss</div>
        <div class="pill" data-val="maintain">⚖ Maintenance</div>
        <div class="pill" data-val="gain">⬆ Muscle Gain</div>
      </div>
    </div>

    <div style="margin-bottom:20px">
      <div class="section-label">Diet Preference</div>
      <div class="toggle-group" id="dietGroup">
        <div class="toggle-opt active" data-val="veg">🥦 Vegetarian</div>
        <div class="toggle-opt" data-val="nonveg">🍗 Non-Vegetarian</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="grid-3" style="margin-bottom:24px">
      <div class="field"><label>Age</label><input type="number" id="age" placeholder="e.g. 22" min="10" max="100"/></div>
      <div class="field"><label>Weight (kg)</label><input type="number" id="weight" placeholder="e.g. 60" min="30" max="200"/></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="height" placeholder="e.g. 165" min="100" max="250"/></div>
    </div>

    <button class="btn" id="generateBtn" onclick="generatePlan()">Generate My Meal Plan →</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Running XGBoost model &amp; building your meal plan…</p>
  </div>

  <div class="results" id="results">
    <div class="stats-row" id="statsRow"></div>
    <div id="mealsContainer"></div>
  </div>
</div>

<script>
let goal = 'loss', diet = 'veg';

document.querySelectorAll('#goalGroup .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#goalGroup .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active'); goal = p.dataset.val;
  });
});
document.querySelectorAll('#dietGroup .toggle-opt').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('#dietGroup .toggle-opt').forEach(x => x.classList.remove('active'));
    t.classList.add('active'); diet = t.dataset.val;
  });
});

async function generatePlan() {
  const age    = document.getElementById('age').value;
  const weight = document.getElementById('weight').value;
  const height = document.getElementById('height').value;

  if (!age || !weight || !height)  { showError('Please fill in Age, Weight and Height.'); return; }
  if (age < 10 || age > 100)       { showError('Age must be between 10 and 100.'); return; }
  if (weight < 30 || weight > 200) { showError('Weight must be between 30–200 kg.'); return; }
  if (height < 100 || height > 250){ showError('Height must be between 100–250 cm.'); return; }

  hideError();
  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('generateBtn').disabled = true;

  try {
    const res = await fetch('/recommend', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({goal, diet, age, weight, height})
    });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    renderResults(data);
  } catch(e) {
    showError('Could not connect. Make sure Flask is running on port 5000.');
  } finally {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('generateBtn').disabled = false;
  }
}

function foodCard(f) {
  return `
    <div class="food-card">
      <div class="food-name">${f.Food}</div>
      <div class="macro-list">
        <div class="macro-row"><span class="k">Calories</span><span class="v">${f.Calories.toFixed(0)} kcal</span></div>
        <div class="macro-row"><span class="k">Protein</span><span class="v">${f.Protein.toFixed(1)}g</span></div>
        <div class="macro-row"><span class="k">Carbs</span><span class="v">${f.Carbs.toFixed(1)}g</span></div>
        <div class="macro-row"><span class="k">Fat</span><span class="v">${f.Fat.toFixed(1)}g</span></div>
      </div>
      <div class="ml-tag"> XGBoost predicted: ${f.ML_Predicted_Protein.toFixed(1)}g protein</div>
    </div>`;
}

function renderResults(data) {
  const n  = data.nutrition;
  const bd = n.breakdown;
  const goalLabel = {loss:'Weight Loss', maintain:'Maintenance', gain:'Muscle Gain'};

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box">
      <div class="val">${n.calories}</div>
      <div class="lbl">Daily Calories</div>
      <div class="note">kcal per day</div>
    </div>
    <div class="stat-box">
      <div class="val">${n.protein}g</div>
      <div class="lbl">Daily Protein</div>
      <div class="note">${goalLabel[data.inputs.goal]}</div>
    </div>
    <div class="stat-box">
      <div class="val">${data.inputs.diet === 'veg' ? '🥦' : '🍗'}</div>
      <div class="lbl">Diet Type</div>
      <div class="note">${data.inputs.diet === 'veg' ? 'Vegetarian' : 'Non-Vegetarian'}</div>
    </div>`;

  const meals = [
    {key:'breakfast', label:'Breakfast', icon:'☀️', cls:'ic-b', protein: bd.breakfast},
    {key:'lunch',     label:'Lunch',     icon:'🍛', cls:'ic-l', protein: bd.lunch},
    {key:'dinner',    label:'Dinner',    icon:'🌙', cls:'ic-d', protein: bd.dinner},
  ];

  document.getElementById('mealsContainer').innerHTML = meals.map(m => `
    <div class="meal-block">
      <div class="meal-title">
        <div class="meal-icon ${m.cls}">${m.icon}</div>
        <h3>${m.label}</h3>
        <span>Target: ${m.protein}g protein</span>
      </div>
      <div class="food-grid">
        ${data.meals[m.key].map(f => foodCard(f)).join('')}
      </div>
    </div>`).join('');

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

function showError(msg) { const b = document.getElementById('errorBox'); b.textContent = '⚠ ' + msg; b.style.display = 'block'; }
function hideError() { document.getElementById('errorBox').style.display = 'none'; }
</script>
</body>
</html>
